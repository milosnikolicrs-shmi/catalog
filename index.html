<title>SHMI Catalog</title>
<style>
  :root {
    --bg: #0c0b09;
    --bg-panel: #15130f;
    --bg-elev: #1f1c17;
    --bg-fill: #262219;
    --hairline: rgba(201, 168, 106, 0.09);
    --text: #ece8e1;
    --text-read: #d9d4cb;
    --text-dim: #928b7d;
    --text-faint: #5f5a50;
    --gold: #c9a86a;
    --gold-soft: #8a744a;
    --gold-tint: rgba(201, 168, 106, 0.14);
    --gold-glow: rgba(201, 168, 106, 0.16);
    --danger: #c05248;
    --ok: #6a9c7f;
    --draft: #6f695e;
    --prod: #c9a86a;
    --final: #6a9c7f;
    --shadow-1: 0 1px 3px rgba(0,0,0,0.4);
    --shadow-2: 0 8px 32px -8px rgba(0,0,0,0.5);
    --mono: 'SF Mono', ui-monospace, Menlo, monospace;
    --serif: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    --topbar-h: 0px;
  }

  body.light {
    --bg: #f4f1ea;
    --bg-panel: #fdfcf9;
    --bg-elev: #ebe7dd;
    --bg-fill: #ffffff;
    --hairline: rgba(120, 100, 60, 0.14);
    --text: #211d16;
    --text-read: #2f2a21;
    --text-dim: #6f6a5c;
    --text-faint: #a29b8b;
    --gold: #96783e;
    --gold-soft: #b0925a;
    --gold-tint: rgba(150, 120, 62, 0.13);
    --gold-glow: rgba(150, 120, 62, 0.18);
    --danger: #b0453a;
    --ok: #3d7a5a;
    --draft: #a29b8b;
    --prod: #96783e;
    --final: #3d7a5a;
    --shadow-1: 0 1px 3px rgba(60, 48, 25, 0.1);
    --shadow-2: 0 8px 30px -10px rgba(60, 48, 25, 0.22);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    transition: background 0.25s;
  }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: 100vh;
    height: 100dvh;
  }

  button { font-family: var(--sans); }
  .btn:active, .icon-btn:active, .mini-btn:active, .home-new:active,
  .ai-btn:active, .gate-btn:active, .copy-btn:active, .seg button:active,
  .song-item:active, .recent-item:active, .stream-link:active, .back-btn:active,
  .topbar-menu:active { transform: scale(0.965); }

  /* ── TOPBAR (mobile) ─────────────────────────── */
  .topbar {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: calc(52px + env(safe-area-inset-top));
    padding-top: env(safe-area-inset-top);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    backdrop-filter: blur(20px) saturate(1.6);
    -webkit-backdrop-filter: blur(20px) saturate(1.6);
    border-bottom: 0.5px solid var(--hairline);
    z-index: 50;

  .recent-item::after {
    content: '\203A';
    color: var(--text-faint);
    font-size: 20px;
    line-height: 1;
    margin-left: 4px;
  }
  .recent-item .r-title { font-family: var(--serif); font-size: 15.5px; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-item .r-sub { font-size: 11.5px; color: var(--text-faint); white-space: nowrap; }

  /* ── EDIT FORM ─────────────────────────────────── */
  .form-grid { display: flex; flex-direction: column; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
    font-weight: 600;
    padding-left: 2px;
  }
  .field input, .field textarea, .field select {
    background: var(--bg-elev);
    border: none;
    border-radius: 11px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--sans);
    outline: none;
    transition: box-shadow 0.15s, background 0.15s;
  }
  body.light .field input, body.light .field textarea, body.light .field select { background: #fff; box-shadow: var(--shadow-1); }
  .field textarea { resize: vertical; line-height: 1.65; }
  .field input:focus, .field textarea:focus, .field select:focus {
    box-shadow: 0 0 0 3px var(--gold-glow);
    background: var(--bg-fill);
  }
  body.light .field input:focus, body.light .field textarea:focus { background: #fff; }
  .field textarea.lyric-area { font-family: var(--serif); min-height: 280px; }
  .field textarea.mono-area { font-family: var(--mono); font-size: 14px; }
  .field .seg { background: var(--bg-elev); }
  .field .seg button { min-height: 36px; font-size: 13px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .cover-upload-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .cover-preview {
    width: 90px; height: 90px;
    border-radius: 14px;
    object-fit: cover;
    background: var(--bg-elev);
    box-shadow: var(--shadow-1);
  }
  .cover-preview-empty {
    width: 90px; height: 90px;
    border-radius: 14px;
    border: 1.5px dashed var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-faint); font-size: 11px; text-align: center;
    opacity: 0.7;
  }

  .form-foot {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(transparent, var(--bg) 38%);
    padding: 20px 0 calc(8px + env(safe-area-inset-bottom));
  }
  .form-foot .btn { flex: 0 0 auto; padding: 12px 28px; min-height: 44px; }

  /* ── PASSWORD GATE ───────────────────────────── */
  .gate {
    display: none;
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 55% at 50% 0%, var(--gold-glow), transparent 55%),
      var(--bg);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .gate.visible { display: flex; }
  .gate-box {
    background: var(--bg-panel);
    border-radius: 22px;
    padding: 42px 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 340px;
    box-shadow: var(--shadow-2);
  }
  .gate-logo { width: 70px; height: 70px; object-fit: contain; border-radius: 16px; box-shadow: var(--shadow-1); }
  .gate-title {
    font-family: var(--serif);
    font-size: 21px;
    letter-spacing: 0.18em;
    color: var(--text);
    font-weight: 600;
  }
  .gate-input {
    width: 100%;
    background: var(--bg-elev);
    border: none;
    border-radius: 11px;
    padding: 13px 14px;
    color: var(--text);
    font-size: 16px;
    outline: none;
    text-align: center;
    letter-spacing: 0.1em;
    transition: box-shadow 0.15s;
  }
  .gate-input:focus { box-shadow: 0 0 0 3px var(--gold-glow); }
  .gate-btn {
    width: 100%;
    background: linear-gradient(155deg, var(--gold), var(--gold-soft));
    border: none;
    color: #1a150b;
    border-radius: 11px;
    padding: 13px;
    font-size: 14.5px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.13s, transform 0.12s;
    min-height: 46px;
  }
  .gate-btn:hover { filter: brightness(1.08); }
  .gate-error { font-size: 12px; color: var(--danger); min-height: 16px; }

  /* ── MODAL (sheet on mobile) ─────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--bg-panel);
    border-radius: 20px;
    padding: 26px;
    width: 560px;
    max-width: 94vw;
    max-height: 84vh;
    overflow-y: auto;
    box-shadow: var(--shadow-2);
  }
  .modal h2 { font-family: var(--serif); font-size: 22px; margin-bottom: 6px; font-weight: 600; }
  .modal p { color: var(--text-dim); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
  .modal textarea {
    width: 100%;
    min-height: 220px;
    background: var(--bg-elev);
    border: none;
    border-radius: 12px;
    padding: 13px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    resize: vertical;
    transition: box-shadow 0.15s;
  }
  .modal textarea:focus { box-shadow: 0 0 0 3px var(--gold-glow); }
  .modal-foot { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  .modal-foot .btn { flex: 0 0 auto; padding: 10px 22px; }

  /* ── PERFORMANCE VIEW ──────────────────────── */
  .perf-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: var(--bg);
    display: none;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .perf-overlay.visible { display: block; }
  .perf-inner {
    max-width: 920px;
    margin: 0 auto;
    padding: 26px 24px 90px;
    padding-top: calc(26px + env(safe-area-inset-top));
  }
  .perf-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 16px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .perf-title-wrap { min-width: 0; }
  .perf-title {
    font-family: var(--serif);
    font-size: calc(26px * var(--perf-scale, 1));
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 600;
  }
  .perf-meta {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 5px;
  }
  .perf-controls { display: flex; gap: 8px; flex-wrap: wrap; }
  .perf-btn {
    background: var(--bg-elev);
    border: none;
    border-radius: 9px;
    padding: 8px 13px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    min-height: 36px;
  }
  .perf-btn:hover { background: var(--bg-fill); color: var(--text); }
  .perf-section {
    display: flex;
    gap: 26px;
    padding: 24px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .perf-label-wrap { width: 120px; flex-shrink: 0; }
  .perf-label {
    font-size: calc(14px * var(--perf-scale, 1));
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding-bottom: 5px;
    border-bottom: 2px solid currentColor;
    display: inline-block;
  }
  .perf-hint {
    display: block;
    font-size: calc(12px * var(--perf-scale, 1));
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .perf-verse { color: #5b82c7; }
  .perf-pre { color: #9a6fc7; }
  .perf-chorus { color: #5f9e6e; }
  .perf-bridge { color: #c78a4a; }
  .perf-other { color: var(--gold); }
  .perf-lines { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
  .perf-line { display: flex; gap: 18px; align-items: baseline; }
  .perf-lyric {
    flex: 1;
    font-size: calc(21px * var(--perf-scale, 1));
    line-height: 1.35;
    color: var(--text);
    font-weight: 500;
  }
  .perf-note {
    width: 150px;
    flex-shrink: 0;
    font-size: calc(13px * var(--perf-scale, 1));
    line-height: 1.4;
    color: var(--text-dim);
    text-align: left;
  }
  .perf-note.accent { color: #9a6fc7; }
  .perf-edit-area {
    width: 100%;
    min-height: 55vh;
    background: var(--bg-elev);
    border: none;
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    outline: none;
    resize: vertical;
  }
  .perf-edit-help {
    font-size: 12.5px;
    color: var(--text-faint);
    margin: 12px 0 16px;
    line-height: 1.6;
  }
  @media (max-width: 760px) {
    .perf-inner { padding: 18px 16px 70px; padding-top: calc(18px + env(safe-area-inset-top)); }
    .perf-section { flex-direction: column; gap: 12px; padding: 18px 0; }
    .perf-label-wrap { width: auto; }
    .perf-line { flex-wrap: wrap; gap: 4px 14px; }
    .perf-lyric { flex-basis: 100%; font-size: calc(19px * var(--perf-scale, 1)); }
    .perf-note { width: auto; margin-left: auto; text-align: right; }
  }

  /* ── TOAST ─────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: calc(26px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: color-mix(in srgb, var(--bg-fill) 90%, transparent);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.25, 1, 0.4, 1);
    z-index: 200;
    max-width: 90vw;
    text-align: center;
    box-shadow: var(--shadow-2);
  }
  .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { color: var(--text); }
  .toast.error { color: var(--danger); }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 44;
  }

  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-fill); border-radius: 6px; border: 2.5px solid var(--bg); }

  /* ── MOBILE ─────────────────────────────────── */
  @media (max-width: 760px) {
    :root { --topbar-h: calc(52px + env(safe-area-inset-top)); }
    .app { grid-template-columns: 1fr; }
    .topbar { display: flex; }

    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 84%;
      max-width: 320px;
      z-index: 46;
      transform: translateX(-105%);
      transition: transform 0.32s cubic-bezier(0.25, 1, 0.35, 1);
      box-shadow: 10px 0 50px rgba(0,0,0,0.45);
      padding-top: env(safe-area-inset-top);
      background: var(--bg-panel);
    }
    body.menu-open .sidebar { transform: translateX(0); }
    body.menu-open .sidebar-backdrop { display: block; }

    .detail { padding-top: var(--topbar-h); }
    .detail-inner { padding: 20px 18px 70px; }
    .detail-title { font-size: 28px; }
    .detail-head { flex-direction: column; gap: 12px; }
    .detail-actions { padding-top: 0; width: 100%; }
    .detail-actions .icon-btn { flex: 1; min-height: 44px; }

    .spec { padding: 11px 10px; }
    .spec .v { font-size: 12px; }

    .album-header { flex-direction: column; }
    .album-header .cover-img { max-width: 100%; }

    .row3, .row2 { grid-template-columns: 1fr; }

    .lyric-head { flex-direction: column; align-items: flex-start; gap: 10px; }
    .lyric-actions { width: 100%; }
    .lyric-actions .mini-btn { flex: 1; min-height: 42px; }
    .lyrics { font-size: 15.5px; }

    .cover-img { max-height: 300px; }
    .suno-block { padding-right: 19px; padding-top: 46px; }

    .analysis-head { flex-direction: column; align-items: stretch; }
    .ai-btn { min-height: 44px; }

    .empty { padding-top: var(--topbar-h); }
    .home { padding: 28px 18px 70px; }
    .home-logo { width: 66px; height: 66px; }
    .home-title { font-size: 23px; }
    .home-stats { gap: 9px; }
    .stat-card { padding: 14px 8px; }
    .stat-num { font-size: 25px; }
    .home-new { width: 100%; }

    /* iOS bottom sheet modals */
    .modal-overlay { align-items: flex-end; padding: 0; }
    .modal {
      width: 100%;
      max-width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 14px 20px calc(24px + env(safe-area-inset-bottom));
      max-height: 88vh;
    }
    .modal::before {
      content: '';
      display: block;
      width: 38px;
      height: 5px;
      border-radius: 3px;
      background: var(--text-faint);
      opacity: 0.5;
      margin: 0 auto 16px;
    }
    .gate-box { padding: 34px 26px; }
  }
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';

// ── FIREBASE ───────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyApz6KfCYH5kgwxyWALr39hdM1vP3kRnSo",
  authDomain: "shmi-catalog.firebaseapp.com",
  projectId: "shmi-catalog",
  storageBucket: "shmi-catalog.firebasestorage.app",
  messagingSenderId: "917724312242",
  appId: "1:917724312242:web:901746a171156b49bb4fab"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ── STATE ──────────────────────────────────────────────────────────
let catalog = [];
let albumsData = [];
let currentId = null;
let currentAlbumName = null;
let filterAlbum = '';
let isEditing = false;
let editBuffer = null;
let albumEditBuffer = null;
let isEditingAlbum = false;

// ── FIRESTORE SYNC ─────────────────────────────────────────────────
function initFirestore() {
  const songsCol = collection(db, 'songs');
  onSnapshot(songsCol, (snapshot) => {
    catalog = [];
    snapshot.forEach(d => catalog.push({ id: d.id, ...d.data() }));
    catalog.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
    renderSidebar();
    if (!isEditing && !isEditingAlbum) {
      if (currentAlbumName) {
        showAlbumDetail(currentAlbumName);
      } else if (currentId) {
        const still = catalog.find(x => x.id === currentId);
        if (still) showDetail();
        else { currentId = catalog.length ? catalog[0].id : null; if (currentId) showDetail(); else showHome(); }
      } else {
        showHome();
      }
    }
  }, () => { showToast('Connection error — check network', 'error'); });

  const albumsCol = collection(db, 'albums');
  onSnapshot(albumsCol, (snapshot) => {
    albumsData = [];
    snapshot.forEach(d => albumsData.push({ id: d.id, ...d.data() }));
    if (!isEditing && !isEditingAlbum && currentAlbumName) showAlbumDetail(currentAlbumName);
  }, (err) => { showToast('Albums sync error: ' + (err.code || err.message), 'error'); });
}

async function writeToFirestore(id, data) { await setDoc(doc(db, 'songs', id), data); }
async function removeFromFirestore(id) { await deleteDoc(doc(db, 'songs', id)); }
function albumSlug(name) { return String(name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'unsorted'; }
async function writeAlbumToFirestore(name, data) { await setDoc(doc(db, 'albums', albumSlug(name)), data); }
function getAlbumMeta(name) { return albumsData.find(a => a.name === name) || null; }

function uid() { return 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }

// ── DUPLICATE DETECTION ────────────────────────────────────────────
function normLyrics(t) {
  return String(t || '').toLowerCase().replace(/\[[^\]]*\]/g, '').replace(/[^a-z0-9]/g, '');
}
function findDuplicate(lyrics, excludeId) {
  const n = normLyrics(lyrics);
  if (!n || n.length < 40) return null;
  return catalog.find(s => s.id !== excludeId && normLyrics(s.lyrics) === n) || null;
}

// ── COVER COMPRESSION ─────────────────────────────────────────────
async function compressImage(dataUrl, maxSize=700, quality=0.78) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ── SIDEBAR ────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('songList');
  const q = document.getElementById('search').value.toLowerCase().trim();
  const fv = document.getElementById('filterVocal').dataset.value || '';
  const fs = document.getElementById('filterStatus').dataset.value || '';

  renderAlbumFilters();

  let filtered = catalog.filter(s => {
    if (fv && s.vocal !== fv) return false;
    if (fs && s.status !== fs) return false;
    if (filterAlbum) {
      const album = (s.album || '').trim();
      if (filterAlbum === 'Unsorted') { if (album) return false; }
      else if (album !== filterAlbum) return false;
    }
    if (q) {
      const hay = [s.title, s.lyrics, s.album, s.genre, s.analysis, s.instruments].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:30px 14px;color:var(--text-faint);font-size:13px;text-align:center;">${catalog.length === 0 ? 'No songs yet.<br>Add your first one.' : 'No matches.'}</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(s => { const a = s.album || 'Unsorted'; (groups[a] = groups[a] || []).push(s); });

  let html = '';
  Object.keys(groups).forEach(album => {
    const labelClickable = album !== 'Unsorted';
    html += labelClickable
      ? `<div class="album-group"><button type="button" class="album-label" data-album="${escAttr(album)}" onclick="showAlbumDetail(this.dataset.album)">${esc(album)}</button>`
      : `<div class="album-group"><div class="album-label">${esc(album)}</div>`;
    groups[album].forEach(s => {
      const idx = catalog.indexOf(s) + 1;
      const num = String(idx).padStart(2, '0');
      html += `<div class="song-item ${s.id === currentId ? 'active' : ''}" onclick="selectSong('${s.id}')">
        <span class="song-num">${num}</span>
        <div class="song-meta">
          <div class="song-title-s">${esc(s.title || 'Untitled')}</div>
          <div class="song-sub-s">${esc(s.genre || '\u2014')}${s.key ? ' \u00b7 ' + esc(s.key) : ''}${s.bpm ? ' \u00b7 ' + esc(s.bpm) + ' BPM' : ''}</div>
        </div>
        <span class="status-dot ${s.status || 'draft'}"></span>
      </div>`;
    });
    html += `</div>`;
  });
  list.innerHTML = html;
}

function renderAlbumFilters() {
  const el = document.getElementById('albumFilters');
  const albums = new Set();
  let hasUnsorted = false;
  catalog.forEach(s => { const a = (s.album || '').trim(); if (a) albums.add(a); else hasUnsorted = true; });
  const sorted = Array.from(albums).sort((a, b) => a.localeCompare(b));
  if (hasUnsorted) sorted.push('Unsorted');
  let html = `<button class="chip ${!currentAlbumName ? 'on' : ''}" onclick="filterByAlbum('')">All</button>`;
  sorted.forEach(a => {
    html += `<button class="chip ${currentAlbumName === a ? 'on' : ''}" data-album="${escAttr(a)}" onclick="filterByAlbum(this.dataset.album)">${esc(a)}</button>`;
  });
  el.innerHTML = html;
}

function filterByAlbum(album) {
  if (!album || album === 'Unsorted') {
    filterAlbum = album === 'Unsorted' ? album : '';
    if (currentAlbumName) { currentAlbumName = null; showHome(); }
    renderSidebar();
    return;
  }
  showAlbumDetail(album);
}

function selectSong(id) {
  if (isEditing) { if (!confirm('Discard unsaved changes?')) return; isEditing = false; editBuffer = null; }
  currentId = id;
  showDetail();
  renderSidebar();
  closeMenu();
}

// ── DETAIL VIEW ────────────────────────────────────────────────────
function showHome() {
  currentAlbumName = null;
  const total = catalog.length;
  const byStatus = { draft: 0, production: 0, final: 0 };
  catalog.forEach(s => { const st = s.status || 'draft'; byStatus[st] = (byStatus[st] || 0) + 1; });
  const albums = new Set(catalog.map(s => s.album || 'Unsorted'));
  const recent = [...catalog].sort((a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0)).slice(0, 4);

  const pct = k => total ? (byStatus[k] / total * 100) : 0;

  const albumNames = Array.from(albums).filter(a => a !== 'Unsorted').sort((a, b) => a.localeCompare(b));
  let albumsHtml = '';

    albumsHtml = `<div class="home-section-label">Albums</div>
    <div class="recent-list">` +
    albumNames.map(a => `<div class="recent-item" data-album="${escAttr(a)}" onclick="showAlbumDetail(this.dataset.album)">
      <span class="r-title">${esc(a)}</span>
      <span class="r-sub">${catalog.filter(s => (s.album || 'Unsorted') === a).length} songs</span>
    </div>`).join('') + `</div>`;
  }

  let recentHtml = '';
  if (recent.length) {
    recentHtml = `<div class="home-section-label">Recently edited</div>
    <div class="recent-list">` +
    recent.map(s => `<div class="recent-item" onclick="selectSong('${s.id}')">
      <span class="status-dot ${s.status||'draft'}"></span>
      <span class="r-title">${esc(s.title || 'Untitled')}</span>
      <span class="r-sub">${esc(s.album || '')}</span>

    </div>
    <div class="status-bar-wrap">

        <div class="seg-draft" style="width:${pct('draft')}%"></div>

        <span><i style="background:var(--prod)"></i>In production ${byStatus.production}</span>

function goHome() {
  if (isEditing) { if (!confirm('Discard unsaved changes?')) return; isEditing = false; editBuffer = null; }
  currentId = null;
  currentAlbumName = null;
  showHome();
  renderSidebar();
}

// ── ALBUM DETAIL ───────────────────────────────────────────────────
const PIPELINE_STAGES = [
  { key:'idea', label:'Idea' },
  { key:'draft-lyrics', label:'Draft lyrics' },
  { key:'demo', label:'Demo' },
  { key:'recording', label:'Recording' },
  { key:'mix', label:'Mix' },
  { key:'master', label:'Master' },
  { key:'distributed', label:'Distributed' }
];
function pipelineLabel(key) { return (PIPELINE_STAGES.find(p => p.key === key) || PIPELINE_STAGES[0]).label; }

function parseDurationToSec(str) {
  if (!str) return null;
  const parts = String(str).trim().split(':').map(Number);
  if (!parts.length || parts.some(isNaN)) return null;
  return parts.reduce((acc, p) => acc * 60 + p, 0);
}
function formatSecToDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

function showAlbumDetail(name) {
  if (isEditing) { if (!confirm('Discard unsaved changes?')) return; isEditing = false; editBuffer = null; }
  isEditingAlbum = false; albumEditBuffer = null;
  currentAlbumName = name;
  currentId = null;
  renderAlbumPage(name);
  renderSidebar();
  closeMenu();
}

function renderAlbumPage(name) {
  const meta = getAlbumMeta(name) || {};
  const tracks = catalog.filter(s => (s.album || 'Unsorted') === name)
    .sort((a, b) => (a.trackNumber ?? 9999) - (b.trackNumber ?? 9999) || (a.createdAt || 0) - (b.createdAt || 0));

  const durations = tracks.map(t => parseDurationToSec(t.duration)).filter(v => v != null);
  const totalDuration = (tracks.length && durations.length === tracks.length)
    ? formatSecToDuration(durations.reduce((a, b) => a + b, 0)) : '—';

  const sokojFiled = tracks.filter(t => t.sokojStatus === 'filed').length;
  const statusLabel = { planned:'Planned', 'in-progress':'In progress', complete:'Complete' }[meta.albumStatus] || 'Planned';

  const paletteHtml = (meta.colorPalette && meta.colorPalette.length)
    ? `<div class="palette-row">${meta.colorPalette.map(c => `<div class="palette-swatch" style="background:${escAttr(c)}"></div>`).join('')}</div>`
    : '';

  const tracklistHtml = tracks.length ? tracks.map((t, i) => `
    <div class="track-row" onclick="selectSong('${t.id}')">
      <div class="track-reorder" onclick="event.stopPropagation()">
        <button ${i === 0 ? 'style="visibility:hidden;"' : `onclick="moveTrackUp('${t.id}')"`}>▲</button>
        <button ${i === tracks.length - 1 ? 'style="visibility:hidden;"' : `onclick="moveTrackDown('${t.id}')"`}>▼</button>
      </div>
      <span class="song-num">${String(i + 1).padStart(2, '0')}</span>
      <div class="track-meta">
        <div class="track-title">${esc(t.title || 'Untitled')}</div>
        <div class="track-sub">${t.duration ? esc(t.duration) + ' · ' : ''}${esc(pipelineLabel(t.pipelineStatus))}</div>
      </div>
      <span class="badge pipeline-${t.pipelineStatus || 'idea'}">${esc(pipelineLabel(t.pipelineStatus))}</span>
      <button class="perf-btn" style="flex-shrink:0;" onclick="event.stopPropagation(); openPerfViewFor('${t.id}')" title="Performance view">♪</button>
    </div>`).join('') : `<div style="color:var(--text-faint);font-size:13.5px;padding:20px 0;">No songs in this album yet.</div>`;

  document.getElementById('detail').innerHTML = `
  <div class="detail-inner">
    <button class="back-btn" onclick="goHome()">&#8249; Home</button>
    <div class="detail-head">
      <h1 class="detail-title">${esc(name)}</h1>
      <div class="detail-actions">
        <button class="icon-btn" onclick="editAlbum('${jsAttr(name)}')">Edit album</button>
      </div>
    </div>
    <div class="album-header">
      ${meta.cover ? `<img class="cover-img" src="${meta.cover}" alt="cover">` : ''}
      <div class="album-header-info">
        ${meta.concept ? `<div class="text-block" style="font-style:italic;">${esc(meta.concept)}</div>` : ''}
        <div class="album-meta-row">
          <div class="album-meta-item"><b>${tracks.length}</b> songs</div>
          <div class="album-meta-item"><b>${totalDuration}</b> total</div>
          <div class="album-meta-item"><span class="badge">${statusLabel}</span></div>
          ${meta.releaseDate ? `<div class="album-meta-item">${meta.releaseDateIsPlanned ? 'Planned release' : 'Released'}: <b>${esc(meta.releaseDate)}</b></div>` : ''}
        </div>
        ${meta.moodTags && meta.moodTags.length ? `<div class="badges">${meta.moodTags.map(t => `<span class="badge">${esc(t)}</span>`).join('')}</div>` : ''}
        ${paletteHtml}

function moveTrack(id, dir) {
  const tracks = catalog.filter(s => (s.album || 'Unsorted') === currentAlbumName)
    .sort((a, b) => (a.trackNumber ?? 9999) - (b.trackNumber ?? 9999) || (a.createdAt || 0) - (b.createdAt || 0));
  const idx = tracks.findIndex(s => s.id === id);
  const swapIdx = idx + dir;
  if (idx < 0 || swapIdx < 0 || swapIdx >= tracks.length) return;
  tracks.forEach((s, i) => { s.trackNumber = i + 1; });
  const tmp = tracks[idx].trackNumber;
  tracks[idx].trackNumber = tracks[swapIdx].trackNumber;
  tracks[swapIdx].trackNumber = tmp;
  renderAlbumPage(currentAlbumName);
  Promise.all([tracks[idx], tracks[swapIdx]].map(s => { const { id, ...data } = s; return writeToFirestore(id, data); }))
    .catch(() => showToast('Reorder failed — check connection', 'error'));
}
function moveTrackUp(id) { moveTrack(id, -1); }
function moveTrackDown(id) { moveTrack(id, 1); }

let perfScale = parseFloat(localStorage.getItem('shmi_perf_scale')) || 1;

function perfSectionClass(label) {
  const l = label.toLowerCase();
  if (l.includes('pre')) return 'perf-pre';
  if (l.includes('chorus') || l.includes('hook') || l.includes('refrain')) return 'perf-chorus';
  if (l.includes('bridge')) return 'perf-bridge';
  if (l.includes('verse')) return 'perf-verse';
  return 'perf-other';
}

function parsePerfSheet(text) {
  const sections = [];
  let cur = null;
  String(text || '').split('\n').forEach(raw => {
    const line = raw.trim();
    if (!line) return;
    const m = line.match(/^\[([^\]]+)\]\s*(?:\(([^)]*)\))?$/);
    if (m) { cur = { label: m[1], hint: m[2] || '', lines: [] }; sections.push(cur); return; }
    if (!cur) { cur = { label: '', hint: '', lines: [] }; sections.push(cur); }
    const idx = line.indexOf('|');
    if (idx >= 0) cur.lines.push({ text: line.slice(0, idx).trim(), note: line.slice(idx + 1).trim() });
    else cur.lines.push({ text: line, note: '' });
  });
  return sections;
}

function openPerfView() {
  const s = catalog.find(x => x.id === currentId);
  if (!s) return;
  const sheet = (s.perfSheet && s.perfSheet.trim()) ? s.perfSheet : (s.lyrics || '');
  const sections = parsePerfSheet(sheet);
  document.documentElement.style.setProperty('--perf-scale', perfScale);

  const meta = [s.key ? 'Key: ' + esc(s.key) : '', s.bpm ? 'Tempo: ' + esc(s.bpm) + ' BPM' : '', s.vocal ? esc(s.vocal) : ''].filter(Boolean).join('  |  ');

  let body = '';
  if (!sections.length) {
    body = `<div style="padding:40px 0;color:var(--text-faint);font-size:14px;">No lyrics yet. Add lyrics to the song, or press Edit to write the performance sheet directly.</div>`;
  } else {
    body = sections.map(sec => `
      <div class="perf-section">
        <div class="perf-label-wrap">
          ${sec.label ? `<span class="perf-label ${perfSectionClass(sec.label)}">${esc(sec.label)}${sec.hint ? `<span class="perf-hint">(${esc(sec.hint)})</span>` : ''}</span>` : ''}

        </div>
      </div>`).join('');
  }

  document.getElementById('perfOverlay').innerHTML = `
  <div class="perf-inner">
    <div class="perf-head">

function renderStreamLinks(s) {
  const links = PLATFORMS.filter(p => s[p.key] && s[p.key].trim());
  if (!links.length) return '';
  let html = '<div class="stream-links">';
  links.forEach(p => { html += `<a class="stream-link" href="${escAttr(s[p.key])}" target="_blank" rel="noopener"><span style="color:${p.color}">${p.icon}</span>${p.name}</a>`; });
  html += '</div>';
  return html;
}

// ── LYRIC ACTIONS ──────────────────────────────────────────────────
function copyLyrics() {
  const s = catalog.find(x => x.id === currentId);
  if (!s || !s.lyrics) return;
  const text = (s.title ? s.title + '\n\n' : '') + s.lyrics;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.lyric-actions .mini-btn');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('done'); setTimeout(() => { btn.textContent='Copy lyrics'; btn.classList.remove('done'); }, 1800); }
  });
}

function printLyrics() {
  const s = catalog.find(x => x.id === currentId);
  if (!s || !s.lyrics) return;
  const w = window.open('', '_blank');
  const safeTitle = esc(s.title || 'Untitled');
  const safeLyrics = esc(s.lyrics);
  w.document.write(`<!DOCTYPE html><html><head><title>${safeTitle}</title>
    <style>
      @media print { @page { margin: 1cm 1.5cm; } }
      html, body { margin:0; padding:0; }
      body { font-family: Georgia, serif; color:#111; line-height:1.7; }
      .sheet { max-width:620px; margin:0 auto; padding:8px 24px 24px; text-align:center; }
      h1 { font-size:28px; margin:0 0 6px; letter-spacing:0.02em; }
      .sub { color:#777; font-size:13px; margin-bottom:24px; text-transform:uppercase; letter-spacing:0.1em; }
      pre { font-family: Georgia, serif; font-size:15px; white-space:pre-wrap; line-height:1.85; text-align:center; margin:0; }
      .tag { color:#b5483d; font-weight:600; font-size:13px; }
    </style></head><body>
    <div class="sheet">
      <h1>${safeTitle}</h1>
      <div class="sub">${esc(s.vocal||'')}${s.key?' \u00b7 '+esc(s.key):''}${s.bpm?' \u00b7 '+esc(s.bpm)+' BPM':''}</div>
      <pre>${safeLyrics.replace(/\[([^\]]+)\]/g, '<span class="tag">[$1]</span>')}</pre>
    </div></body></html>`);
  w.document.close();
  setTimeout(() => { w.print(); }, 250);
}

function creditsToText(credits) {
  return (credits || []).map(c => c.role ? `${c.name} — ${c.role}` : c.name).join('\n');
}
function textToCredits(text) {
  return text.split('\n').map(l => l.trim()).filter(Boolean).map(l => {
    const idx = l.indexOf('—');
    if (idx === -1) return { name: l, role: '' };
    return { name: l.slice(0, idx).trim(), role: l.slice(idx + 1).trim() };
  });
}

function uniqueOptions(values) {
  const seen = new Set();
  values.forEach(v => { if (v && v.trim()) seen.add(v.trim()); });
  return Array.from(seen).sort((a, b) => a.localeCompare(b)).map(v => `<option value="${escAttr(v)}">`).join('');
}

let pendingCover = null;
function handleCoverUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingCover = ev.target.result;
    document.getElementById('coverPreviewWrap').innerHTML = `<img id="coverPreview" class="cover-preview" src="${pendingCover}">`;
  };
  reader.readAsDataURL(file);
}

function removeCover() {
  pendingCover = '';
  document.getElementById('coverPreviewWrap').innerHTML = `<div id="coverPreview" class="cover-preview-empty">No image</div>`;
}

async function saveSong() {
  if (!editBuffer) return;
  editBuffer.title = val('f_title');
  editBuffer.vocal = document.getElementById('f_vocal').dataset.value || 'Intimate female';
  editBuffer.status = document.getElementById('f_status').dataset.value || 'draft';
  editBuffer.album = val('f_album');
  editBuffer.bpm = val('f_bpm');
  editBuffer.key = val('f_key');
  editBuffer.genre = val('f_genre');
  editBuffer.lyrics = val('f_lyrics');
  editBuffer.chords = val('f_chords');
  editBuffer.instruments = val('f_instruments');
  editBuffer.suno = val('f_suno');
  editBuffer.production = val('f_production');
  editBuffer.analysis = val('f_analysis');
  editBuffer.spotify = val('f_spotify');
  editBuffer.apple = val('f_apple');
  editBuffer.youtube = val('f_youtube');
  editBuffer.soundcloud = val('f_soundcloud');
  editBuffer.deezer = val('f_deezer');
  editBuffer.pipelineStatus = val('f_pipeline') || 'idea';
  editBuffer.duration = val('f_duration');
  editBuffer.sunoNegative = val('f_suno_neg');
  editBuffer.credits = textToCredits(val('f_credits'));
  editBuffer.sokojStatus = document.getElementById('f_sokoj').dataset.value || 'not-filed';
  const masterVal = val('f_masterpct');
  editBuffer.vocalistMasterPct = masterVal === '' ? '' : parseFloat(masterVal);
  editBuffer.crossCatalogEcho = val('f_echo');
  if (pendingCover !== null) { editBuffer.cover = pendingCover ? await compressImage(pendingCover) : ''; pendingCover = null; }
  if (!editBuffer.title.trim()) editBuffer.title = 'Untitled';
  const dup = findDuplicate(editBuffer.lyrics, editBuffer.id);
  if (dup) {
    if (!confirm(`These lyrics already exist in the catalog as "${dup.title || 'Untitled'}". Save anyway?`)) return;
  }
  if (editBuffer._prevLyrics !== undefined && editBuffer._prevLyrics !== editBuffer.lyrics && editBuffer._prevLyrics.trim()) {
    editBuffer.lyricsHistory = [...(editBuffer.lyricsHistory || []), { text: editBuffer._prevLyrics, timestamp: Date.now() }];
  }
  delete editBuffer._prevLyrics;
  editBuffer.updatedAt = Date.now();
  if (!editBuffer.createdAt) editBuffer.createdAt = Date.now();
  try {
    const { id, ...data } = editBuffer;
    showToast('Saving\u2026', 'success');
    await writeToFirestore(id, data);
    currentId = id;
    isEditing = false;
    editBuffer = null;
    showToast('Saved \u2713', 'success');
  } catch(e) { showToast('Save failed \u2014 check connection', 'error'); }
}

function cancelEdit() {
  editBuffer = null; pendingCover = null; isEditing = false;
  const stillExists = catalog.find(x => x.id === currentId);
  if (!stillExists) currentId = catalog.length ? catalog[0].id : null;
  if (currentId) showDetail(); else showHome();
  renderSidebar();
}

async function deleteSong() {
  const s = catalog.find(x => x.id === currentId);
  if (!s) return;
  if (!confirm(`Delete "${s.title || 'Untitled'}"? This cannot be undone.`)) return;
  try {
    await removeFromFirestore(currentId);
    currentId = null; showHome();
    showToast('Song deleted', 'success');
  } catch(e) { showToast('Delete failed \u2014 check connection', 'error'); }
}

// ── IMPORT / EXPORT ────────────────────────────────────────────────
function openImport() { document.getElementById('importModal').classList.add('visible'); }
function closeImport() { document.getElementById('importModal').classList.remove('visible'); document.getElementById('importText').value=''; }

async function doImport() {
  const txt = document.getElementById('importText').value.trim();
  if (!txt) return;
  try {
    let data = JSON.parse(txt);
    if (!Array.isArray(data)) data = [data];
    const dups = data.filter(s => findDuplicate(s.lyrics, s.id));
    if (dups.length) {
      const names = dups.map(s => s.title || 'Untitled').join(', ');
      const keep = confirm(`${dups.length} song${dups.length!==1?'s':''} already exist${dups.length===1?'s':''} in the catalog with the same lyrics: ${names}.\n\nOK = import them anyway (duplicates)\nCancel = skip duplicates, import the rest`);
      if (!keep) data = data.filter(s => !findDuplicate(s.lyrics, s.id));
      if (!data.length) { closeImport(); showToast('Nothing to import \u2014 all were duplicates', 'error'); return; }
    }
    showToast(`Importing ${data.length} song${data.length!==1?'s':''}\u2026`, 'success');
    for (const s of data) {
      const id = s.id || uid();
      const clean = {
        title:s.title||'', vocal:s.vocal||'Intimate female', status:s.status||'draft',
        pipelineStatus:s.pipelineStatus||'idea', duration:s.duration||'',
        album:s.album||'', bpm:s.bpm||'', key:s.key||'', genre:s.genre||'',
        lyrics:s.lyrics||'', suno:s.suno||'', sunoNegative:s.sunoNegative||'', production:s.production||'',
        instruments:s.instruments||'', chords:s.chords||'', analysis:s.analysis||'', cover:s.cover||'',
        spotify:s.spotify||'', apple:s.apple||'', youtube:s.youtube||'',
        soundcloud:s.soundcloud||'', deezer:s.deezer||'', audioName:s.audioName||'',
        credits:s.credits||[], sokojStatus:s.sokojStatus||'not-filed',
        vocalistMasterPct:s.vocalistMasterPct!=null?s.vocalistMasterPct:'', crossCatalogEcho:s.crossCatalogEcho||'',
        lyricsHistory:s.lyricsHistory||[], trackNumber:s.trackNumber!=null?s.trackNumber:null,
        perfSheet:s.perfSheet||'',
        createdAt:s.createdAt||Date.now(), updatedAt:Date.now()
      };
      await writeToFirestore(id, clean);
    }
    closeImport();
    showToast(`Imported ${data.length} song${data.length!==1?'s':''} \u2713`, 'success');
  } catch(e) { showToast('Import failed \u2014 check JSON format', 'error'); }
}

function openExport() {
  const exportData = catalog.map(({ createdAt, updatedAt, ...rest }) => rest);
  document.getElementById('exportText').value = JSON.stringify(exportData, null, 2);
  document.getElementById('exportModal').classList.add('visible');
}
function closeExport() { document.getElementById('exportModal').classList.remove('visible'); }
function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportText').value).then(() => showToast('Copied to clipboard', 'success'));
}

function copySuno() {
  const s = catalog.find(x => x.id === currentId);
  if (!s || !s.suno) return;
  navigator.clipboard.writeText(s.suno).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = 'Copied!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent='Copy'; btn.classList.remove('copied'); }, 1800); }
  });
}

// ── UTILS ──────────────────────────────────────────────────────────
function val(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function esc(str) { return String(str==null?'':str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(str) { return esc(str).replace(/"/g,'&quot;'); }
function jsAttr(str) { return escAttr(String(str==null?'':str).replace(/\\/g,'\\\\').replace(/'/g,"\\'")); }

let toastTimer;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} visible`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className='toast'; }, 2600);
}

// ── KEYBOARD ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('importModal').classList.contains('visible')) { closeImport(); return; }
    if (document.getElementById('exportModal').classList.contains('visible')) { closeExport(); return; }
    if (isEditing) { cancelEdit(); return; }
  }
  if ((e.metaKey||e.ctrlKey) && e.key==='s' && isEditing) { e.preventDefault(); saveSong(); }
  if ((e.metaKey||e.ctrlKey) && e.key==='n' && !isEditing) { e.preventDefault(); newSong(); }
});

// ── FIREBASE AUTH LOGIN ────────────────────────────────────────────
async function checkPass() {
  const email = document.getElementById('gateEmail').value.trim();
  const pass = document.getElementById('gateInput').value;
  const err = document.getElementById('gateError');
  if (!email || !pass) { err.textContent = 'Enter email and password'; return; }
  err.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById('gateInput').value = '';
  } catch (e) {
    err.textContent = 'Wrong email or password';
    document.getElementById('gateInput').value = '';
    setTimeout(() => { err.textContent = ''; }, 2500);
  }
}

// ── SEGMENTED CONTROL ──────────────────────────────────────────────
function seg(btn, v) {
  const c = btn.parentElement;
  c.dataset.value = v;
  [...c.querySelectorAll('button')].forEach(b => b.classList.toggle('on', b === btn));
  if (c.id === 'filterVocal' || c.id === 'filterStatus') renderSidebar();
}

// ── MOBILE MENU ────────────────────────────────────────────────────
function toggleMenu() { document.body.classList.toggle('menu-open'); }
function closeMenu() { document.body.classList.remove('menu-open'); }

// ── THEME ──────────────────────────────────────────────────────────
let lightMode = localStorage.getItem('shmi_theme') === 'light';
function applyTheme() {
  document.body.classList.toggle('light', lightMode);
  document.getElementById('themeIcon').innerHTML = lightMode ? '&#9728;' : '&#9789;';
  document.getElementById('themeLabel').textContent = lightMode ? 'Dark mode' : 'Light mode';
}
function toggleTheme() {
  lightMode = !lightMode;
  localStorage.setItem('shmi_theme', lightMode ? 'light' : 'dark');
  applyTheme();
}

// ── EXPOSE TO WINDOW (module scope requires this for onclick handlers) ──
window.renderSidebar = renderSidebar;
window.filterByAlbum = filterByAlbum;

window.deleteSong = deleteSong;

window.closeImport = closeImport;

window.copyExport = copyExport;

window.copyLyrics = copyLyrics;
window.printLyrics = printLyrics;

window.generateAnalysis = generateAnalysis;

window.goHome = goHome;

window.saveAlbum = saveAlbum;
window.cancelAlbumEdit = cancelAlbumEdit;
window.moveTrackUp = moveTrackUp;
window.moveTrackDown = moveTrackDown;

window.removeAlbumCover = removeAlbumCover;

window.openPerfViewFor = openPerfViewFor;
window.closePerfView = closePerfView;
window.perfFont = perfFont;

window.savePerfSheet = savePerfSheet;

// ── INIT ───────────────────────────────────────────────────────────
applyTheme();
showHome();
let fsStarted = false;
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('gate').classList.remove('visible');
    if (!fsStarted) { fsStarted = true; initFirestore(); }
  } else {
    document.getElementById('gate').classList.add('visible');
  }
});
